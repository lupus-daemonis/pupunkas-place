<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pupunkas ❤️ place</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E❤️%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        :root {
            --text-color: #925749;
            --sub-color: #c07a5a;
            --tabs-bg: rgba(255, 245, 235, 0.85);
            --tab-color: #b8a89a;
            --tab-active-bg: #f5d5c5;
            --tab-active-color: #e07a5a;
            --card-bg: rgba(255, 250, 245, 0.85);
            --card-border: 1px solid rgba(255, 220, 200, 0.5);
            --input-bg: rgba(255, 250, 245, 0.85);
            --input-border: 1px solid rgba(255, 200, 180, 0.6);
            --btn-add-bg: rgba(230, 200, 180, 0.85);
            --btn-add-hover: #e07a5a;
            --btn-random-bg: rgba(245, 225, 210, 0.85);
            --btn-random-color: #e07a5a;
            --btn-random-hover: #e07a5a;
            --done-btn-bg: rgba(200, 230, 200, 0.8);
            --done-btn-color: #6a9a6a;
            --delete-btn-bg: rgba(255, 220, 210, 0.8);
            --delete-btn-color: #e07a5a;
            --empty-msg-bg: rgba(255, 245, 240, 0.7);
            --empty-msg-color: #d4c4b4;
            --bubble-bg: #fcf4f0;
            --bubble-text: #7c5948;
            --shadow: 0 6px 14px rgba(0,0,0,0.08);
            --cat-shadow: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
            --bg-overlay: linear-gradient(180deg, rgba(255, 235, 220, 0.3) 0%, rgba(230, 190, 170, 0.7) 100%);
            --toast-bg: #f5d5c5;
            --toast-text: #5a4a3a;
            --modal-bg: rgba(255, 250, 245, 0.95);
            --author-her: #e07a5a;
            --author-his: #5a9e6e;
            --scrollbar-track: rgba(224, 122, 90, 0.15);
            --scrollbar-thumb: #e07a5a;
            --scrollbar-thumb-hover: #c05a3a;
        }

        body.dark {
            --text-color: #e8e8ec;
            --sub-color: #9a9aa8;
            --tabs-bg: rgba(26, 26, 34, 0.7);
            --tab-color: #9a9aa8;
            --tab-active-bg: #2a2a35;
            --tab-active-color: #e05a5a;
            --card-bg: rgba(30, 30, 40, 0.8);
            --card-border: none;
            --input-bg: rgba(21, 21, 28, 0.8);
            --input-border: 1px solid rgba(42, 42, 53, 0.5);
            --btn-add-bg: rgba(42, 42, 53, 0.8);
            --btn-add-hover: #e05a5a;
            --btn-random-bg: rgba(30, 30, 40, 0.8);
            --btn-random-color: #e05a5a;
            --btn-random-hover: #e05a5a;
            --done-btn-bg: rgba(30, 42, 32, 0.8);
            --done-btn-color: #8fbc6e;
            --delete-btn-bg: rgba(42, 30, 32, 0.8);
            --delete-btn-color: #e05a5a;
            --empty-msg-bg: rgba(21, 21, 28, 0.6);
            --empty-msg-color: #6a6a7a;
            --bubble-bg: #e05a5a;
            --bubble-text: white;
            --shadow: 0 6px 14px rgba(0,0,0,0.25);
            --cat-shadow: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
            --bg-overlay: linear-gradient(145deg, rgba(18, 18, 26, 0.55) 0%, rgba(26, 26, 36, 0.55) 100%);
            --toast-bg: #2a2a35;
            --toast-text: #e8e8ec;
            --modal-bg: rgba(30, 30, 40, 0.95);
            --author-her: #e07a5a;
            --author-his: #6a9e6e;
            --scrollbar-track: rgba(224, 90, 90, 0.2);
            --scrollbar-thumb: #e05a5a;
            --scrollbar-thumb-hover: #c04a4a;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
            transition: background 0.3s ease, color 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(3px);
            z-index: -2;
            transition: background-image 0.3s ease;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
            transition: background 0.3s ease;
        }

        body.bg-room::before { background-image: url('background/pexels-asumaani-17279643.jpg'); }
        body.bg-room2::before { background-image: url('background/pexels-cottonbro-6156879.jpg'); }
        body.bg-cats::before { background-image: url('background/qujrvux9fssg1.jpeg'); }
        body.bg-gradient::before {
            background-image: linear-gradient(135deg, #fff9f0, #ffe8e0);
            filter: none;
        }
        body.dark.bg-gradient::before {
            background-image: linear-gradient(145deg, #12121a, #1a1a24);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }
        
        .list {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .bg-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 60px;
            z-index: 1001;
            box-shadow: var(--shadow);
        }
        .bg-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }
        .bg-btn.active { border-color: #e07a5a; box-shadow: 0 0 0 2px rgba(224,122,90,0.3); }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            z-index: 1001;
        }
        
        .app {
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 20px;
            padding-bottom: 20px;
        }
        
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 650;
            background: linear-gradient(135deg, #f5a5a5, #e07a5a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }
        .sub { 
            color: var(--sub-color); 
            font-size: 1.2rem; 
            text-align: center; 
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--tabs-bg);
            padding: 6px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 0.85rem;
            font-weight: 550;
            padding: 10px 8px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--tab-color);
        }
        .tab.active { background: var(--tab-active-bg); color: var(--tab-active-color); }
        .panel { 
            display: none; 
            flex: 1;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }
        .panel.active { 
            display: flex; 
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .filter-select {
            flex: 1;
            padding: 10px 16px;
            border-radius: 60px;
            border: var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.85rem;
        }
        .reset-filter-btn {
            background: var(--delete-btn-bg);
            color: var(--delete-btn-color);
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            cursor: pointer;
        }
        .random-inline-btn {
            background: var(--btn-random-bg);
            color: var(--btn-random-color);
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 550;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .random-inline-btn:hover {
            background: var(--btn-random-hover);
            color: white;
        }
        
        .list {
            list-style: none;
            margin: 0 0 15px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 6px;
        }

        .list li { 
            background: var(--card-bg); 
            backdrop-filter: blur(4px); 
            border-radius: 28px; 
            padding: 12px 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 8px; 
            border: var(--card-border);
        }
        .item-info { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; flex: 1; }
        .item-name { font-size: 0.95rem; color: var(--text-color); }
        .item-genre { font-size: 0.7rem; background: rgba(224, 122, 90, 0.2); padding: 2px 8px; border-radius: 20px; color: var(--tab-active-color); }
        .author-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; background: rgba(0,0,0,0.1); }
        .author-her { background: rgba(224,122,90,0.2); color: #e07a5a; }
        .author-his { background: rgba(90,158,110,0.2); color: #5a9e6e; }
        .done .item-name { text-decoration: line-through; opacity: 0.5; }
        .actions { display: flex; gap: 8px; }
        .done-btn, .delete-btn { padding: 6px 10px; border-radius: 40px; cursor: pointer; border: none; }
        .done-btn { background: var(--done-btn-bg); color: var(--done-btn-color); }
        .delete-btn { background: var(--delete-btn-bg); color: var(--delete-btn-color); }
        
        .add-toggle-btn {
            background: var(--btn-add-bg);
            color: var(--text-color);
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            cursor: pointer;
            border: none;
            font-weight: 550;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .add-toggle-btn:hover {
            background: var(--btn-add-hover);
            color: white;
        }
        
        .expandable-add-form {
            display: none;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 15px;
            border: var(--card-border);
            margin-bottom: 20px;
            animation: fadeUp 0.2s ease;
            flex-shrink: 0;
        }
        .expandable-add-form.show {
            display: block;
        }
        .inline-add-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .inline-add-form input {
            flex: 2;
            padding: 12px 16px;
            border-radius: 60px;
            border: var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            min-width: 150px;
        }
        .inline-add-form select {
            flex: 1;
            padding: 12px 16px;
            border-radius: 60px;
            border: var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
        }
        .inline-add-btn {
            background: var(--btn-add-hover);
            color: white;
            padding: 12px 22px;
            border-radius: 60px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            white-space: nowrap;
        }
        .inline-add-btn:hover {
            background: #c05a3a;
            transform: scale(0.97);
        }
        
        .empty-msg { text-align: center; color: var(--empty-msg-color); padding: 36px 20px; background: var(--empty-msg-bg); border-radius: 40px; }

        /* Котики - оригинальный размер для ПК */
        .cat-fixed { 
            position: fixed; 
            bottom: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 1000;
        }
        .cat-left { left: max(25px, env(safe-area-inset-left)); }
        .cat-right { right: max(25px, env(safe-area-inset-right)); }
        .cat-avatar { 
            cursor: pointer;
            transition: transform 0.2s;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: var(--cat-shadow);
        }
        .cat-right .cat-avatar img {
            transform: scaleX(-1);
        }
        .cat-avatar:hover {
            transform: scale(1.05);
        }
        .cat-right .cat-avatar:hover img {
            transform: scaleX(-1) scale(1.05);
        }
        .cat-name { font-size: 1rem; color: var(--tab-active-color); font-weight: 600; margin-top: 5px; }

        .bubble {
            position: absolute;
            bottom: 215px;
            background: var(--bubble-bg);
            border-radius: 30px;
            padding: 10px 18px;
            min-width: 170px;
            max-width: 280px;
            width: auto;
            height: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }
        .bubble:after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: var(--bubble-bg) transparent;
        }
        .cat-left .bubble { left: 80%; transform: translateX(-50%); }
        .cat-left .bubble:after { left: 30%; transform: translateX(-50%); }
        .cat-right .bubble { right: 80%; transform: translateX(50%); }
        .cat-right .bubble:after { right: 30%; transform: translateX(50%); }

        .bubble .bubble-text {
            color: var(--bubble-text);
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            width: 100%;
            word-wrap: break-word;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
            transition: background 0.1s;
        }
        .bubble .bubble-text:hover {
            background: rgba(255,255,255,0.2);
        }

        .status-input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            font-size: 0.9rem;
            font-family: inherit;
            padding: 10px 12px;
            border-radius: 40px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        .edit-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 4px;
        }
        .edit-buttons button {
            background: rgba(0,0,0,0.1);
            border: none;
            color: var(--bubble-text);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .edit-buttons button:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Модалка выбора аватара */
        .avatar-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .avatar-modal.show {
            visibility: visible;
            opacity: 1;
        }
        .avatar-selector {
            background: var(--modal-bg);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 24px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(224,122,90,0.3);
        }
        .avatar-selector h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--tab-active-color);
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .avatar-option {
            cursor: pointer;
            padding: 10px;
            border-radius: 28px;
            transition: all 0.2s;
            background: var(--card-bg);
            border: 2px solid transparent;
        }
        .avatar-option:hover {
            transform: scale(1.05);
            background: var(--tab-active-bg);
        }
        .avatar-option.selected {
            border-color: var(--tab-active-color);
            background: var(--tab-active-bg);
        }
        .avatar-option img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .avatar-option span {
            display: block;
            font-size: 0.7rem;
            margin-top: 5px;
            color: var(--text-color);
        }
        .avatar-close {
            background: var(--delete-btn-bg);
            color: var(--delete-btn-color);
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--toast-bg);
            backdrop-filter: blur(12px);
            color: var(--toast-text);
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: var(--shadow);
            z-index: 2000;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 1rem;
            white-space: nowrap;
        }
        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast-notification button {
            background: rgba(224,122,90,0.3);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--toast-text);
            font-weight: 600;
        }
        .toast-notification button:active {
            transform: scale(0.95);
        }

        .heart-burst {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
        }
        .heart {
            position: absolute;
            font-size: 22px;
            animation: flyHeart 1s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            opacity: 1;
        }
        @keyframes flyHeart {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx, 0), var(--dy, -120px)) scale(0.3) rotate(20deg);
                opacity: 0;
            }
        }

        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .custom-modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: var(--modal-bg);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px 32px;
            text-align: center;
            max-width: 300px;
            width: 80%;
            box-shadow: var(--shadow);
            border: 1px solid rgba(224,122,90,0.3);
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .modal-btn.confirm {
            background: var(--btn-add-hover);
            color: white;
        }
        .modal-btn.cancel {
            background: var(--delete-btn-bg);
            color: var(--delete-btn-color);
        }

        @media (max-width: 768px) {
            .cat-avatar { width: 70px; height: 70px; }
            .bubble { min-width: 150px; max-width: 220px; padding: 8px 14px; bottom: 95px; }
            .bg-switcher { top: auto; bottom: 20px; left: 50%; transform: translateX(-50%); }
            .avatar-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .avatar-option img { width: 60px; height: 60px; }
            .filter-bar { flex-wrap: wrap; }
            .random-inline-btn { flex-shrink: 0; }
            h1 { font-size: 2.5rem; }
            .sub { font-size: 1rem; }
        }
        @media (max-width: 600px) {
            .cat-avatar { width: 55px; height: 55px; }
            .bubble { min-width: 120px; max-width: 180px; padding: 6px 12px; bottom: 80px; }
            .inline-add-form { flex-direction: column; }
            .inline-add-btn { width: 100%; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .random-inline-btn { width: 100%; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body class="bg-room">
    <div class="bg-switcher" id="bgSwitcher"></div>
    <button class="theme-toggle" id="themeToggle" title="Сменить тему">☀️</button>

    <div class="app">
        <h1>Pupunkas ❤️ place</h1>
        <div class="sub">Скромная обитель нескромных пупунек</div>

        <div class="content-wrapper">
            <div class="tabs">
                <button class="tab active" data-tab="films">🎬 Кино / Аниме</button>
                <button class="tab" data-tab="cooking">🍳 Готовка вместе</button>
                <button class="tab" data-tab="places">🏞️ Места и отдых</button>
            </div>

            <button class="add-toggle-btn" id="globalAddBtn">➕ Добавить запись</button>
            <div class="expandable-add-form" id="globalAddForm">
                <div class="inline-add-form" id="dynamicAddForm"></div>
            </div>

            <div id="filmsPanel" class="panel active">
                <div class="filter-bar">
                    <select id="genreFilter" class="filter-select"><option value="all">Все жанры</option></select>
                    <button id="resetFilterBtn" class="reset-filter-btn">Сбросить</button>
                    <button id="randomFilmBtn" class="random-inline-btn">🎲 Случайный фильм</button>
                </div>
                <ul id="filmsList" class="list"></ul>
            </div>

            <div id="cookingPanel" class="panel">
                <ul id="cookingList" class="list"></ul>
            </div>

            <div id="placesPanel" class="panel">
                <ul id="placesList" class="list"></ul>
            </div>
        </div>
    </div>

    <div id="toastMessage" class="toast-notification">
        <span>✨ Фильм добавлен!</span>
        <button id="closeToastBtn">Ура!</button>
    </div>
    <div id="deleteModal" class="custom-modal">
        <div class="modal-content">
            <p>Удалить фильм?</p>
            <div class="modal-buttons">
                <button class="modal-btn confirm" id="modalConfirm">Дяяяяя</button>
                <button class="modal-btn cancel" id="modalCancel">Неть 🥹</button>
            </div>
        </div>
    </div>

    <div id="avatarModal" class="avatar-modal">
        <div class="avatar-selector">
            <h3 id="avatarModalTitle">🐱 Выбери образ котика 🐱</h3>
            <div class="avatar-grid" id="avatarGrid"></div>
            <button class="avatar-close" id="avatarCloseBtn">Закрыть</button>
        </div>
    </div>

    <div id="catLeftContainer" class="cat-fixed cat-left"></div>
    <div id="catRightContainer" class="cat-fixed cat-right"></div>

    <script type="module">

        const HER_AVATARS = [
            { id: 'her1', name: 'Милашка', url: 'avatar/1w.png' },
            { id: 'her2', name: 'Сладусик', url: 'avatar/2w.png' },
            { id: 'her3', name: 'Грустняшка', url: 'avatar/3w.png' }
        ];
        
        const HIS_AVATARS = [
            { id: 'his1', name: 'Милашка', url: 'avatar/1g.png' },
            { id: 'his2', name: 'Сладусик', url: 'avatar/2g.png' },
            { id: 'his3', name: 'Грустняшка', url: 'avatar/3g.png' }
        ];
        
        function heartBurst(x, y) {
            const burstContainer = document.createElement('div');
            burstContainer.className = 'heart-burst';
            burstContainer.style.position = 'fixed';
            burstContainer.style.left = '0';
            burstContainer.style.top = '0';
            burstContainer.style.width = '100%';
            burstContainer.style.height = '100%';
            burstContainer.style.pointerEvents = 'none';
            burstContainer.style.zIndex = '10000';
            document.body.appendChild(burstContainer);
            
            const heartCount = 35;
            const hearts = ['❤️', '💖', '💗', '💓', '💕', '💝', '💘', '🌸', '🌷', '💞'];
            
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 160;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 100;
                const startX = x + (Math.random() - 0.5) * 30;
                const startY = y + (Math.random() - 0.5) * 30;
                heart.style.left = (startX - 15) + 'px';
                heart.style.top = (startY - 15) + 'px';
                heart.style.setProperty('--dx', dx + 'px');
                heart.style.setProperty('--dy', dy + 'px');
                heart.style.fontSize = (16 + Math.random() * 18) + 'px';
                heart.style.position = 'absolute';
                heart.style.color = `rgb(255, ${120 + Math.random() * 80}, ${140 + Math.random() * 60})`;
                burstContainer.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
            setTimeout(() => burstContainer.remove(), 1100);
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        let currentUser = urlParams.get('user');
        if (!currentUser || (currentUser !== 'her' && currentUser !== 'his')) {
            const choice = prompt('👋 Кто ты?\n\nВведи "her" (Пупуня) или "his" (Пупунь)');
            currentUser = (choice === 'her' || choice === 'his') ? choice : 'her';
            window.history.replaceState({}, '', `${window.location.pathname}?user=${currentUser}`);
        }
        localStorage.setItem('pupunkas_user', currentUser);
        const isHer = currentUser === 'her';
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDJI5DkbEs8_ojQHOTZ6NfXor8ZH4Rioao",
            authDomain: "pupunkas-place.firebaseapp.com",
            projectId: "pupunkas-place",
            storageBucket: "pupunkas-place.firebasestorage.app",
            messagingSenderId: "979886120410",
            appId: "1:979886120410:web:8ee8ed0096414e791634e3"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const filmsCol = collection(db, "films");
        const cookingCol = collection(db, "cooking");
        const placesCol = collection(db, "places");
        const statusCol = collection(db, "status_v2");
        const avatarsCol = collection(db, "avatars");
        
        let films = [], cooking = [], places = [];
        let currentGenreFilter = "all";
        let activeTab = "films";
        
        let herAvatar = HER_AVATARS[0].url;
        let hisAvatar = HIS_AVATARS[0].url;
        
        async function loadAvatars() {
            const snap = await getDocs(avatarsCol);
            snap.forEach(doc => {
                const data = doc.data();
                if (data.owner === 'her') herAvatar = data.avatar;
                if (data.owner === 'his') hisAvatar = data.avatar;
            });
            updateCatAvatars();
        }
        
        async function saveAvatar(owner, avatarUrl) {
            const snap = await getDocs(avatarsCol);
            let existing = null;
            snap.forEach(doc => { if (doc.data().owner === owner) existing = doc; });
            if (existing) {
                await updateDoc(doc(db, "avatars", existing.id), { avatar: avatarUrl });
            } else {
                await addDoc(avatarsCol, { owner, avatar: avatarUrl });
            }
            if (owner === 'her') herAvatar = avatarUrl;
            else hisAvatar = avatarUrl;
            updateCatAvatars();
            showToast(`🐱 Образ котика обновлён!`);
        }
        
        function updateCatAvatars() {
            const leftImg = document.getElementById('leftCatImg');
            const rightImg = document.getElementById('rightCatImg');
            if (leftImg) leftImg.src = isHer ? herAvatar : hisAvatar;
            if (rightImg) rightImg.src = isHer ? hisAvatar : herAvatar;
        }
        
        function renderCats() {
            const leftContainer = document.getElementById('catLeftContainer');
            const rightContainer = document.getElementById('catRightContainer');
            
            const leftCatContent = `
                <div class="bubble">
                    <span class="bubble-text" id="leftStatusText">${isHer ? '✨ Хочу обнимашек ✨' : '🍜 Готовлю ужин 🍜'}</span>
                </div>
                <div class="cat-avatar" id="leftCatAvatar">
                    <img id="leftCatImg" src="${isHer ? herAvatar : hisAvatar}" alt="${isHer ? 'Пупуня' : 'Пупунь'}">
                </div>
                <div class="cat-name">${isHer ? 'Пупуня' : 'Пупунь'}</div>
            `;
            
            const rightCatContent = `
                <div class="bubble">
                    <span class="bubble-text" id="rightStatusText">${isHer ? '🍜 Готовлю ужин 🍜' : '✨ Хочу обнимашек ✨'}</span>
                </div>
                <div class="cat-avatar" id="rightCatAvatar">
                    <img id="rightCatImg" src="${isHer ? hisAvatar : herAvatar}" alt="${isHer ? 'Пупунь' : 'Пупуня'}">
                </div>
                <div class="cat-name">${isHer ? 'Пупунь' : 'Пупуня'}</div>
            `;
            
            leftContainer.innerHTML = leftCatContent;
            rightContainer.innerHTML = rightCatContent;
            
            const leftAvatarDiv = document.getElementById('leftCatAvatar');
            const rightAvatarDiv = document.getElementById('rightCatAvatar');
            
            if (leftAvatarDiv) {
                leftAvatarDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openAvatarSelector(isHer ? 'her' : 'his');
                });
            }
            if (rightAvatarDiv) {
                rightAvatarDiv.style.cursor = 'default';
                rightAvatarDiv.style.opacity = '0.8';
            }
        }
        
        const avatarModal = document.getElementById('avatarModal');
        const avatarModalTitle = document.getElementById('avatarModalTitle');
        
        function openAvatarSelector(owner) {
            if ((owner === 'her' && !isHer) || (owner === 'his' && isHer)) {
                showToast(`💭 Ты можешь менять только своего котика!`);
                return;
            }
            const grid = document.getElementById('avatarGrid');
            const currentAvatar = owner === 'her' ? herAvatar : hisAvatar;
            const avatarsList = owner === 'her' ? HER_AVATARS : HIS_AVATARS;
            const ownerName = owner === 'her' ? 'Пупуня' : 'Пупунь';
            avatarModalTitle.innerHTML = `🐱 Выбери образ для ${ownerName} 🐱`;
            
            grid.innerHTML = avatarsList.map(av => `
                <div class="avatar-option ${currentAvatar === av.url ? 'selected' : ''}" data-url="${av.url}">
                    <img src="${av.url}" alt="${av.name}">
                    <span>${av.name}</span>
                </div>
            `).join('');
            
            grid.querySelectorAll('.avatar-option').forEach(opt => {
                opt.addEventListener('click', async () => {
                    const newAvatar = opt.dataset.url;
                    await saveAvatar(owner, newAvatar);
                    avatarModal.classList.remove('show');
                });
            });
            avatarModal.classList.add('show');
        }
        
        document.getElementById('avatarCloseBtn').addEventListener('click', () => {
            avatarModal.classList.remove('show');
        });
        
        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            toast.querySelector('span').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        document.getElementById('closeToastBtn').addEventListener('click', (e) => {
            const rect = document.getElementById('closeToastBtn').getBoundingClientRect();
            heartBurst(rect.left + rect.width/2, rect.top + rect.height/2);
            document.getElementById('toastMessage').classList.remove('show');
        });
        
        let pendingDelete = null;
        const modal = document.getElementById('deleteModal');
        function showDeleteModal(callback) {
            pendingDelete = callback;
            modal.classList.add('show');
        }
        document.getElementById('modalConfirm').onclick = () => {
            if (pendingDelete) pendingDelete(true);
            modal.classList.remove('show');
            pendingDelete = null;
        };
        document.getElementById('modalCancel').onclick = () => {
            if (pendingDelete) pendingDelete(false);
            modal.classList.remove('show');
            pendingDelete = null;
        };
        
        function makeEditable(element, owner) {
            if ((owner === 'her' && !isHer) || (owner === 'his' && isHer)) {
                showToast(`💭 Ты можешь менять только свой статус!`);
                return;
            }
            if (element.parentElement.querySelector('.status-input')) return;
            const original = element.textContent;
            element.style.display = 'none';
            const input = document.createElement('input');
            input.type = 'text';
            input.value = original;
            input.className = 'status-input';
            const btnDiv = document.createElement('div');
            btnDiv.className = 'edit-buttons';
            const saveBtn = document.createElement('button'); saveBtn.innerHTML = '✅';
            const cancelBtn = document.createElement('button'); cancelBtn.innerHTML = '❌';
            btnDiv.append(saveBtn, cancelBtn);
            element.parentElement.insertBefore(input, element.nextSibling);
            element.parentElement.insertBefore(btnDiv, input.nextSibling);
            input.focus();
            const cleanup = () => { input.remove(); btnDiv.remove(); element.style.display = ''; };
            const save = async () => {
                const newText = input.value.trim();
                if (newText && newText !== original) {
                    element.textContent = newText;
                    const snap = await getDocs(statusCol);
                    let existing = null;
                    snap.forEach(d => { if (d.data().owner === owner) existing = d; });
                    if (existing) await updateDoc(doc(db, "status_v2", existing.id), { text: newText });
                    else await addDoc(statusCol, { owner, text: newText });
                    showToast(`💬 Статус обновлён!`);
                }
                cleanup();
            };
            saveBtn.onclick = save;
            cancelBtn.onclick = cleanup;
            input.onkeypress = (e) => { if (e.key === 'Enter') save(); };
            input.onkeydown = (e) => { if (e.key === 'Escape') cleanup(); };
        }
        
        async function addItem(collectionRef, name, extra = {}) {
            if (!name.trim()) return;
            await addDoc(collectionRef, { name: name.trim(), done: false, createdAt: new Date(), author: currentUser, ...extra });
            showToast(`✅ Добавлено!`);
        }
        
        const globalAddForm = document.getElementById('globalAddForm');
        const dynamicAddForm = document.getElementById('dynamicAddForm');
        
        function updateAddForm() {
            if (activeTab === 'films') {
                dynamicAddForm.innerHTML = `
                    <input type="text" id="newFilmInput" placeholder="Название фильма / аниме...">
                    <select id="filmGenre">
                        <option value="Драма">🎭 Драма</option>
                        <option value="Комедия">😂 Комедия</option>
                        <option value="Ужасы">👻 Ужасы</option>
                        <option value="Фэнтези">🐉 Фэнтези</option>
                        <option value="Аниме">🍥 Аниме</option>
                        <option value="Боевик">💥 Боевик</option>
                        <option value="Романтика">💕 Романтика</option>
                        <option value="Триллер">🔪 Триллер</option>
                    </select>
                    <button id="dynamicAddBtn" class="inline-add-btn">+ Добавить фильм</button>
                `;
                const addBtn = document.getElementById('dynamicAddBtn');
                const input = document.getElementById('newFilmInput');
                if (addBtn) {
                    addBtn.onclick = () => {
                        addItem(filmsCol, input?.value || '', { genre: document.getElementById('filmGenre')?.value || 'Драма' });
                        if (input) input.value = '';
                        globalAddForm.classList.remove('show');
                    };
                }
                if (input) input.onkeypress = (e) => { if (e.key === 'Enter') addBtn?.click(); };
            } else if (activeTab === 'cooking') {
                dynamicAddForm.innerHTML = `
                    <input type="text" id="newCookingInput" placeholder="Блюдо: паста, пицца, рамен...">
                    <button id="dynamicAddBtn" class="inline-add-btn">+ Добавить блюдо</button>
                `;
                const addBtn = document.getElementById('dynamicAddBtn');
                const input = document.getElementById('newCookingInput');
                if (addBtn) {
                    addBtn.onclick = () => {
                        addItem(cookingCol, input?.value || '');
                        if (input) input.value = '';
                        globalAddForm.classList.remove('show');
                    };
                }
                if (input) input.onkeypress = (e) => { if (e.key === 'Enter') addBtn?.click(); };
            } else if (activeTab === 'places') {
                dynamicAddForm.innerHTML = `
                    <input type="text" id="newPlaceInput" placeholder="Кафе, парк, квест, выставка...">
                    <button id="dynamicAddBtn" class="inline-add-btn">+ Добавить место</button>
                `;
                const addBtn = document.getElementById('dynamicAddBtn');
                const input = document.getElementById('newPlaceInput');
                if (addBtn) {
                    addBtn.onclick = () => {
                        addItem(placesCol, input?.value || '');
                        if (input) input.value = '';
                        globalAddForm.classList.remove('show');
                    };
                }
                if (input) input.onkeypress = (e) => { if (e.key === 'Enter') addBtn?.click(); };
            }
        }
        
        document.getElementById('globalAddBtn').addEventListener('click', () => {
            updateAddForm();
            globalAddForm.classList.toggle('show');
            if (globalAddForm.classList.contains('show')) {
                const input = dynamicAddForm.querySelector('input');
                if (input) setTimeout(() => input.focus(), 100);
            }
        });
        
        async function handleDelete(collectionName, id, itemAuthor) {
            if (itemAuthor !== currentUser) {
                showToast(`🚫 Нельзя удалить чужую запись!`);
                return false;
            }
            return new Promise((resolve) => {
                showDeleteModal(async (confirmed) => {
                    if (confirmed) {
                        await deleteDoc(doc(db, collectionName, id));
                        showToast(`🗑️ Удалено!`);
                    }
                    resolve();
                });
            });
        }
        
        document.body.addEventListener('click', async (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const li = btn.closest('li');
            if (!li) return;
            const id = li.dataset.id;
            const type = li.dataset.type;
            const action = btn.dataset.action;
            let item = null;
            if (type === 'films') item = films.find(i => i.id === id);
            else if (type === 'cooking') item = cooking.find(i => i.id === id);
            else if (type === 'places') item = places.find(i => i.id === id);
            if (!item) return;
            if (action === 'toggle') {
                let col = type === 'films' ? 'films' : type === 'cooking' ? 'cooking' : 'places';
                await updateDoc(doc(db, col, id), { done: !item.done });
            } else if (action === 'delete') {
                let col = type === 'films' ? 'films' : type === 'cooking' ? 'cooking' : 'places';
                await handleDelete(col, id, item.author);
            }
        });
        
        function randomFromList(list, typeName) {
            const active = list.filter(i => !i.done);
            if (!active.length) { alert(`✨ Нет активных записей в "${typeName}"`); return; }
            const rand = active[Math.floor(Math.random() * active.length)];
            const authorName = rand.author === 'her' ? 'Пупуня' : 'Пупунь';
            alert(`🎉 ${typeName}: ${rand.name}${rand.genre ? ` (${rand.genre})` : ''}\n✨ Добавил(а): ${authorName}`);
        }
        
        document.getElementById('randomFilmBtn')?.addEventListener('click', () => randomFromList(films, 'Фильм/аниме'));
        
        function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])) || ''; }
        
        const genreIcons = { 'Драма':'🎭','Комедия':'😂','Ужасы':'👻','Фэнтези':'🐉','Аниме':'🍥','Боевик':'💥','Романтика':'💕','Триллер':'🔪' };
        
        function renderFilms() {
            let filtered = currentGenreFilter === 'all' ? films : films.filter(f => f.genre === currentGenreFilter);
            if (!filtered.length) { filmsListEl.innerHTML = '<div class="empty-msg">✨ Нет фильмов по выбранному жанру</div>'; return; }
            filmsListEl.innerHTML = filtered.map(f => `
                <li data-id="${f.id}" data-type="films" class="${f.done ? 'done' : ''}">
                    <div class="item-info">
                        <span class="item-name">${escapeHtml(f.name)}</span>
                        <span class="item-genre">${genreIcons[f.genre] || '🎬'} ${escapeHtml(f.genre || 'Без жанра')}</span>
                        <span class="author-badge ${f.author === 'her' ? 'author-her' : 'author-his'}">${f.author === 'her' ? '🐱‍👤 Пупуня' : '🐱‍🐉 Пупунь'}</span>
                    </div>
                    <div class="actions"><button class="done-btn" data-action="toggle">✓</button><button class="delete-btn" data-action="delete">✗</button></div>
                </li>
            `).join('');
        }
        
        function renderCooking() {
            if (!cooking.length) { cookingListEl.innerHTML = '<div class="empty-msg">🍳 Добавьте блюда, которые хотите приготовить</div>'; return; }
            cookingListEl.innerHTML = cooking.map(c => `
                <li data-id="${c.id}" data-type="cooking" class="${c.done ? 'done' : ''}">
                    <div class="item-info">
                        <span class="item-name">${escapeHtml(c.name)}</span>
                        <span class="author-badge ${c.author === 'her' ? 'author-her' : 'author-his'}">${c.author === 'her' ? '🐱‍👤 Пупуня' : '🐱‍🐉 Пупунь'}</span>
                    </div>
                    <div class="actions"><button class="done-btn" data-action="toggle">✓</button><button class="delete-btn" data-action="delete">✗</button></div>
                </li>
            `).join('');
        }
        
        function renderPlaces() {
            if (!places.length) { placesListEl.innerHTML = '<div class="empty-msg">🌳 Добавьте места, куда хотите сходить</div>'; return; }
            placesListEl.innerHTML = places.map(p => `
                <li data-id="${p.id}" data-type="places" class="${p.done ? 'done' : ''}">
                    <div class="item-info">
                        <span class="item-name">${escapeHtml(p.name)}</span>
                        <span class="author-badge ${p.author === 'her' ? 'author-her' : 'author-his'}">${p.author === 'her' ? '🐱‍👤 Пупуня' : '🐱‍🐉 Пупунь'}</span>
                    </div>
                    <div class="actions"><button class="done-btn" data-action="toggle">✓</button><button class="delete-btn" data-action="delete">✗</button></div>
                </li>
            `).join('');
        }
        
        const filmsListEl = document.getElementById('filmsList');
        const cookingListEl = document.getElementById('cookingList');
        const placesListEl = document.getElementById('placesList');
        
        onSnapshot(query(filmsCol, orderBy("createdAt", "desc")), (snap) => { films = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderFilms(); });
        onSnapshot(query(cookingCol, orderBy("createdAt", "desc")), (snap) => { cooking = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderCooking(); });
        onSnapshot(query(placesCol, orderBy("createdAt", "desc")), (snap) => { places = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderPlaces(); });
        
        onSnapshot(statusCol, (snap) => {
            snap.forEach(doc => {
                const data = doc.data();
                const leftStatus = document.getElementById('leftStatusText');
                const rightStatus = document.getElementById('rightStatusText');
                if (data.owner === 'her') {
                    if (isHer && leftStatus) leftStatus.textContent = data.text;
                    if (!isHer && rightStatus) rightStatus.textContent = data.text;
                }
                if (data.owner === 'his') {
                    if (!isHer && leftStatus) leftStatus.textContent = data.text;
                    if (isHer && rightStatus) rightStatus.textContent = data.text;
                }
            });
        });
        
        const genreSelect = document.getElementById('genreFilter');
        const genres = ['Драма','Комедия','Ужасы','Фэнтези','Аниме','Боевик','Романтика','Триллер'];
        genres.forEach(g => { const opt = document.createElement('option'); opt.value = g; opt.textContent = `${genreIcons[g] || '🎬'} ${g}`; genreSelect.appendChild(opt); });
        genreSelect.addEventListener('change', (e) => { currentGenreFilter = e.target.value; renderFilms(); });
        document.getElementById('resetFilterBtn')?.addEventListener('click', () => { genreSelect.value = 'all'; currentGenreFilter = 'all'; renderFilms(); });
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const tabId = tab.dataset.tab;
                document.getElementById(`${tabId}Panel`).classList.add('active');
                activeTab = tabId;
                if (globalAddForm.classList.contains('show')) updateAddForm();
            });
        });
        
        setTimeout(() => {
            const leftStatus = document.getElementById('leftStatusText');
            const rightStatus = document.getElementById('rightStatusText');
            if (leftStatus) leftStatus.addEventListener('click', () => makeEditable(leftStatus, isHer ? 'her' : 'his'));
            if (rightStatus) rightStatus.style.cursor = 'default';
        }, 100);
        
        function loadUserSettings() {
            const savedTheme = localStorage.getItem(`theme_${currentUser}`);
            if (savedTheme === 'dark') document.body.classList.add('dark');
            else document.body.classList.remove('dark');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
            const savedBg = localStorage.getItem(`bg_${currentUser}`) || 'room';
            document.body.classList.forEach(c => { if (c.startsWith('bg-')) document.body.classList.remove(c); });
            document.body.classList.add(`bg-${savedBg}`);
        }
        function saveUserTheme() { localStorage.setItem(`theme_${currentUser}`, document.body.classList.contains('dark') ? 'dark' : 'light'); }
        function saveUserBg(bgId) { localStorage.setItem(`bg_${currentUser}`, bgId); }
        
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            saveUserTheme();
            document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
        });
        
        const bgList = [
            { id: 'room', name: 'Уютн', img: 'background/pexels-asumaani-17279643.jpg' },
            { id: 'room2', name: 'Комната', img: 'background/pexels-cottonbro-6156879.jpg' },
            { id: 'cats', name: 'Котность', img: 'background/qujrvux9fssg1.jpeg' },
            { id: 'gradient', name: 'Нежный градиент', img: null }
        ];
        const bgSwitcher = document.getElementById('bgSwitcher');
        bgSwitcher.innerHTML = '';
        bgList.forEach(bg => {
            const btn = document.createElement('div');
            btn.className = 'bg-btn';
            btn.title = bg.name;
            if (bg.img) {
                btn.style.backgroundImage = `url('${bg.img}')`;
                btn.style.backgroundSize = 'cover';
            } else {
                btn.style.background = 'linear-gradient(135deg, #f5a5a5, #e07a5a)';
            }
            if (localStorage.getItem(`bg_${currentUser}`) === bg.id) btn.classList.add('active');
            else if (!localStorage.getItem(`bg_${currentUser}`) && bg.id === 'room') btn.classList.add('active');
            btn.addEventListener('click', () => {
                bgList.forEach(b => document.body.classList.remove(`bg-${b.id}`));
                document.body.classList.add(`bg-${bg.id}`);
                saveUserBg(bg.id);
                document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
            bgSwitcher.appendChild(btn);
        });
        
        renderCats();
        loadAvatars();
        loadUserSettings();
    </script>
</body>
</html>
