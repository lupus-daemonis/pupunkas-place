<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pupunkas ❤️ place</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        :root {
            --text-color: #925749;
            --sub-color: #c07a5a;
            --tabs-bg: rgba(255, 245, 235, 0.85);
            --tab-color: #b8a89a;
            --tab-active-bg: #f5d5c5;
            --tab-active-color: #e07a5a;
            --card-bg: rgba(255, 250, 245, 0.85);
            --card-border: 1px solid rgba(255, 220, 200, 0.5);
            --input-bg: rgba(255, 250, 245, 0.85);
            --input-border: 1px solid rgba(255, 200, 180, 0.6);
            --btn-add-bg: rgba(230, 200, 180, 0.85);
            --btn-add-hover: #e07a5a;
            --btn-random-bg: rgba(245, 225, 210, 0.85);
            --btn-random-color: #e07a5a;
            --btn-random-hover: #e07a5a;
            --done-btn-bg: rgba(200, 230, 200, 0.8);
            --done-btn-color: #6a9a6a;
            --delete-btn-bg: rgba(255, 220, 210, 0.8);
            --delete-btn-color: #e07a5a;
            --empty-msg-bg: rgba(255, 245, 240, 0.7);
            --empty-msg-color: #d4c4b4;
            --bubble-bg: #fcf4f0;
            --bubble-text: #7c5948;
            --shadow: 0 6px 14px rgba(0,0,0,0.08);
            --cat-shadow: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
            --bg-overlay: linear-gradient(180deg, rgba(255, 235, 220, 0.3) 0%, rgba(230, 190, 170, 0.7) 100%);
            --toast-bg: #f5d5c5;
            --toast-text: #5a4a3a;
            --modal-bg: rgba(255, 250, 245, 0.95);
            --author-her: #e07a5a;
            --author-his: #5a9e6e;
            --scrollbar-track: rgba(224, 122, 90, 0.15);
            --scrollbar-thumb: #e07a5a;
            --scrollbar-thumb-hover: #c05a3a;
        }

        body.dark {
            --text-color: #e8e8ec;
            --sub-color: #9a9aa8;
            --tabs-bg: rgba(26, 26, 34, 0.7);
            --tab-color: #9a9aa8;
            --tab-active-bg: #2a2a35;
            --tab-active-color: #e05a5a;
            --card-bg: rgba(30, 30, 40, 0.8);
            --card-border: none;
            --input-bg: rgba(21, 21, 28, 0.8);
            --input-border: 1px solid rgba(42, 42, 53, 0.5);
            --btn-add-bg: rgba(42, 42, 53, 0.8);
            --btn-add-hover: #e05a5a;
            --btn-random-bg: rgba(30, 30, 40, 0.8);
            --btn-random-color: #e05a5a;
            --btn-random-hover: #e05a5a;
            --done-btn-bg: rgba(30, 42, 32, 0.8);
            --done-btn-color: #8fbc6e;
            --delete-btn-bg: rgba(42, 30, 32, 0.8);
            --delete-btn-color: #e05a5a;
            --empty-msg-bg: rgba(21, 21, 28, 0.6);
            --empty-msg-color: #6a6a7a;
            --bubble-bg: #e05a5a;
            --bubble-text: white;
            --shadow: 0 6px 14px rgba(0,0,0,0.25);
            --cat-shadow: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
            --bg-overlay: linear-gradient(145deg, rgba(18, 18, 26, 0.55) 0%, rgba(26, 26, 36, 0.55) 100%);
            --toast-bg: #2a2a35;
            --toast-text: #e8e8ec;
            --modal-bg: rgba(30, 30, 40, 0.95);
            --author-her: #e07a5a;
            --author-his: #6a9e6e;
            --scrollbar-track: rgba(224, 90, 90, 0.2);
            --scrollbar-thumb: #e05a5a;
            --scrollbar-thumb-hover: #c04a4a;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(3px);
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        body.bg-room::before { background-image: url('background/pexels-asumaani-17279643.jpg'); }
        body.bg-room2::before { background-image: url('background/pexels-cottonbro-6156879.jpg'); }
        body.bg-cats::before { background-image: url('background/qujrvux9fssg1.jpeg'); }
        body.bg-gradient::before {
            background-image: linear-gradient(135deg, #fff9f0, #ffe8e0);
            filter: none;
        }
        body.dark.bg-gradient::before {
            background-image: linear-gradient(145deg, #12121a, #1a1a24);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        .bg-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 60px;
            z-index: 1001;
            box-shadow: var(--shadow);
        }
        .bg-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }
        .bg-btn.active { border-color: #e07a5a; }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            z-index: 1001;
        }

        .app {
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            font-weight: 650;
            background: linear-gradient(135deg, #f5a5a5, #e07a5a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            color: var(--sub-color);
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--tabs-bg);
            padding: 6px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 0.85rem;
            font-weight: 550;
            padding: 10px 8px;
            border-radius: 40px;
            cursor: pointer;
            color: var(--tab-color);
        }
        .tab.active { background: var(--tab-active-bg); color: var(--tab-active-color); }

        .panel { display: none; flex: 1; flex-direction: column; min-height: 0; overflow: hidden; }
        .panel.active { display: flex; }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .filter-select {
            flex: 1;
            padding: 10px 16px;
            border-radius: 60px;
            border: var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.85rem;
        }
        .random-inline-btn {
            background: var(--btn-random-bg);
            color: var(--btn-random-color);
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 550;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .list {
            list-style: none;
            margin: 0 0 15px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 6px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        .list li {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border: var(--card-border);
        }
        .item-info { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; flex: 1; }
        .item-name { font-size: 0.95rem; color: var(--text-color); }
        .item-genre { font-size: 0.7rem; background: rgba(224, 122, 90, 0.2); padding: 2px 8px; border-radius: 20px; color: var(--tab-active-color); }
        .author-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 20px; background: rgba(0,0,0,0.1); }
        .author-her { background: rgba(224,122,90,0.2); color: #e07a5a; }
        .author-his { background: rgba(90,158,110,0.2); color: #5a9e6e; }
        .done .item-name { text-decoration: line-through; opacity: 0.5; }
        .actions { display: flex; gap: 8px; }
        .done-btn, .delete-btn { padding: 6px 10px; border-radius: 40px; cursor: pointer; border: none; }
        .done-btn { background: var(--done-btn-bg); color: var(--done-btn-color); }
        .delete-btn { background: var(--delete-btn-bg); color: var(--delete-btn-color); }

        .add-toggle-btn {
            background: var(--btn-add-bg);
            color: var(--text-color);
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            cursor: pointer;
            border: none;
            font-weight: 550;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        /* Мобильная кнопка рандома (показывается только на мобильных) */
        .mobile-random-btn {
            display: none;
            background: var(--btn-random-bg);
            color: var(--btn-random-color);
            border: none;
            padding: 14px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 550;
            font-size: 0.95rem;
            white-space: nowrap;
            margin-bottom: 15px;
        }

        .expandable-add-form {
            display: none;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 15px;
            border: var(--card-border);
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .expandable-add-form.show { display: block; }
        .inline-add-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .inline-add-form input {
            flex: 2;
            padding: 12px 16px;
            border-radius: 60px;
            border: var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            min-width: 150px;
        }
        .inline-add-form select {
            flex: 1;
            padding: 12px 16px;
            border-radius: 60px;
            border: var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
        }
        .inline-add-btn {
            background: var(--btn-add-hover);
            color: white;
            padding: 12px 22px;
            border-radius: 60px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            white-space: nowrap;
        }

        .empty-msg { text-align: center; color: var(--empty-msg-color); padding: 36px 20px; background: var(--empty-msg-bg); border-radius: 40px; }

        .cat-fixed {
            position: fixed;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }
        .cat-left { left: max(25px, env(safe-area-inset-left)); }
        .cat-right { right: max(25px, env(safe-area-inset-right)); }
        .cat-avatar {
            cursor: pointer;
            transition: transform 0.2s;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: var(--cat-shadow);
        }
        .cat-right .cat-avatar img {
            transform: scaleX(-1);
        }
        .cat-name { font-size: 0.9rem; color: var(--tab-active-color); font-weight: 600; margin-top: 5px; }
        .bubble {
            position: absolute;
            bottom: 170px;
            background: var(--bubble-bg);
            border-radius: 30px;
            padding: 8px 15px;
            min-width: 130px;
            max-width: 200px;
            box-shadow: var(--shadow);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .bubble:after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: var(--bubble-bg) transparent;
        }
        .cat-left .bubble { left: 80%; transform: translateX(-50%); }
        .cat-right .bubble { right: 80%; transform: translateX(50%); }
        .bubble .bubble-text {
            color: var(--bubble-text);
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            padding: 6px 10px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            display: block;
            max-width: 100%;
        }

        .avatar-modal, .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .avatar-modal.show, .custom-modal.show { visibility: visible; opacity: 1; }
        .avatar-selector, .modal-content {
            background: var(--modal-bg);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .avatar-selector h3, .modal-content p { font-size: 1.3rem; margin-bottom: 20px; color: var(--tab-active-color); }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .avatar-option {
            cursor: pointer;
            padding: 10px;
            border-radius: 28px;
            background: var(--card-bg);
            border: 2px solid transparent;
        }
        .avatar-option.selected { border-color: var(--tab-active-color); background: var(--tab-active-bg); }
        .avatar-option img { width: 70px; height: 70px; object-fit: contain; }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .modal-btn.confirm { background: var(--btn-add-hover); color: white; }
        .modal-btn.cancel { background: var(--delete-btn-bg); color: var(--delete-btn-color); }

        .avatar-close {
            background: rgba(224,122,90,0.15);
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            color: var(--tab-active-color);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }
        .avatar-close:hover {
            background: var(--tab-active-color);
            color: white;
            transform: scale(1.02);
        }
        .avatar-close:active {
            transform: scale(0.98);
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--toast-bg);
            backdrop-filter: blur(12px);
            color: var(--toast-text);
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 2000;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .toast-notification.show { transform: translateX(-50%) translateY(0); }

        .toast-notification button {
            background: linear-gradient(135deg, #f5a5a5, #e07a5a);
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(224,122,90,0.4);
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }
        .toast-notification button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #e07a5a, #c05a3a);
            box-shadow: 0 6px 16px rgba(224,122,90,0.6);
        }
        .toast-notification button:active {
            transform: scale(0.96);
        }
        body.dark .toast-notification button {
            background: linear-gradient(135deg, #e05a5a, #c04a4a);
            box-shadow: 0 4px 12px rgba(224,90,90,0.4);
        }
        body.dark .toast-notification button:hover {
            background: linear-gradient(135deg, #c04a4a, #a03a3a);
        }

        .status-input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 40px;
            width: 100%;
            text-align: center;
        }
        .edit-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 6px;
        }
        .edit-buttons button {
            background: rgba(0,0,0,0.1);
            border: none;
            color: var(--bubble-text);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        /* Мобильные стили */
        @media (max-width: 768px) {
            /* Скрываем фильтр и оригинальную кнопку рандома */
            .filter-select, .filter-bar, .filter-bar .random-inline-btn {
                display: none;
            }
            /* Показываем мобильную кнопку рандома */
            .mobile-random-btn {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 8px;
                width: 100%;
                margin-bottom: 15px;
            }
            /* Кнопка "Добавить запись" и мобильный рандом в одну строку */
            .add-toggle-btn, .mobile-random-btn {
                width: calc(50% - 4px);
                display: inline-flex;
                margin-bottom: 15px;
                font-size: 0.85rem;
                padding: 12px;
            }
            .add-toggle-btn {
                margin-right: 8px;
            }
            .add-toggle-btn, .mobile-random-btn {
                width: calc(50% - 4px);
            }
            /* Контейнер для двух кнопок */
            .buttons-row {
                display: flex;
                gap: 8px;
                flex-shrink: 0;
                margin-bottom: 15px;
            }

            /* Котики */
            .cat-fixed {
                bottom: 8px;
                z-index: 999;
            }
            .cat-left { left: 8px; }
            .cat-right { right: 8px; }
            .cat-avatar {
                width: 60px !important;
                height: 60px !important;
                cursor: pointer;
            }
            .cat-name {
                font-size: 0.65rem !important;
                margin-top: 2px;
            }
            /* Облачки */
            .cat-left .bubble {
                left: 8px;
                transform: none;
                bottom: 92px;
            }
            .cat-right .bubble {
                right: 8px;
                transform: none;
                bottom: 92px;
            }
            .cat-left .bubble:after {
                left: 20% !important;
                transform: translateX(-50%) !important;
            }
            .cat-right .bubble:after {
                left: auto !important;
                right: 20% !important;
                transform: translateX(50%) !important;
            }
            .bubble {
                max-width: calc(100vw - 90px);
                white-space: normal;
                word-wrap: break-word;
            }
            .bubble .bubble-text {
                font-size: 0.75rem;
                padding: 4px 8px;
                display: inline-block;
                max-width: 100%;
            }

            /* Tabs внизу между котиками */
            @media (max-width: 768px) {
                /* Табы – в потоке над кнопками */
                .tabs {
                    position: static;
                    transform: none;
                    width: 100%;
                    margin-bottom: 15px;
                    background: var(--tabs-bg);
                    border-radius: 100px;
                    padding: 6px;
                    gap: 6px;
                }
                .tab {
                    font-size: 0.7rem;
                    padding: 6px 8px;
                    white-space: nowrap;
                }

                /* Переключатель фонов – внизу между котиками */
                .bg-switcher {
                    position: fixed;
                    bottom: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    top: auto;
                    right: auto;
                    background: var(--card-bg);
                    backdrop-filter: blur(8px);
                    padding: 6px 12px;
                    border-radius: 60px;
                    z-index: 1001;
                    display: flex;
                    gap: 8px;
                    flex-direction: row;
                    width: auto;
                    box-shadow: var(--shadow);
                }
                .bg-btn {
                    width: 36px !important;
                    height: 36px !important;
                }

                /* При открытой форме скрываем и кружки фона, и котиков */
                body.form-open .bg-switcher {
                    display: none;
                }

                /* Котики (уже были) */
                .cat-fixed {
                    bottom: 8px;
                    z-index: 999;
                }
                .cat-left { left: 8px; }
                .cat-right { right: 8px; }
                .cat-avatar {
                    width: 60px !important;
                    height: 60px !important;
                    cursor: pointer;
                }
                .cat-name {
                    font-size: 0.65rem !important;
                    margin-top: 2px;
                }

                /* Облачки */
                .cat-left .bubble {
                    left: 8px;
                    transform: none;
                    bottom: 92px;
                }
                .cat-right .bubble {
                    right: 8px;
                    transform: none;
                    bottom: 92px;
                }
                .cat-left .bubble:after {
                    left: 20% !important;
                    transform: translateX(-50%) !important;
                }
                .cat-right .bubble:after {
                    left: auto !important;
                    right: 20% !important;
                    transform: translateX(50%) !important;
                }
                .bubble {
                    max-width: calc(100vw - 90px);
                    white-space: normal;
                    word-wrap: break-word;
                }
                .bubble .bubble-text {
                    font-size: 0.75rem;
                    padding: 4px 8px;
                    display: inline-block;
                    max-width: 100%;
                }

                /* Кнопки "Добавить запись" и "Рандом" в одну строку (уже есть) */
                .filter-select, .filter-bar .random-inline-btn {
                    display: none;
                }
                .mobile-random-btn {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    gap: 8px;
                    width: 100%;
                    margin-bottom: 15px;
                }
                .add-toggle-btn, .mobile-random-btn {
                    width: calc(50% - 4px);
                    display: inline-flex;
                    margin-bottom: 15px;
                    font-size: 0.85rem;
                    padding: 12px;
                }
                .add-toggle-btn {
                    margin-right: 8px;
                }
                .buttons-row {
                    display: flex;
                    gap: 8px;
                    flex-shrink: 0;
                    margin-bottom:  0 !important;
                }

                /* Форма поверх контента */
                body.form-open .cat-fixed {
                    display: none;
                }
                .expandable-add-form.show {
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    width: 90%;
                    max-width: 400px;
                    z-index: 10002;
                    margin: 0;
                    background: var(--modal-bg);
                    backdrop-filter: blur(16px);
                    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
                }
                body.form-open::before {
                    content: '';
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0,0,0,0.6);
                    backdrop-filter: blur(4px);
                    z-index: 10001;
                }

                /* Заголовки и остальные элементы */
                h1 {
                    font-size: 1.8rem !important;
                    margin-top: 10px !important;
                    margin-bottom: 4px !important;
                }
                .sub {
                    font-size: 0.7rem !important;
                    margin-bottom: 10px !important;
                }
                .theme-toggle {
                    top: 10px !important;
                    right: 10px !important;
                    width: 36px !important;
                    height: 36px !important;
                    font-size: 1rem !important;
                }
                .inline-add-form {
                    flex-direction: column;
                    gap: 8px;
                }
                .inline-add-form input, .inline-add-form select {
                    width: 100%;
                    min-width: auto;
                }
                .inline-add-btn {
                    width: 100%;
                    margin-top: 4px;
                }
                .list {
                    padding-bottom: 120px; 
                    margin-bottom: 0;
                }
                .list li {
                    padding: 10px 12px;
                }
                .item-name {
                    font-size: 0.85rem;
                }
                .done-btn, .delete-btn {
                    padding: 6px 10px;
                    font-size: 0.7rem;
                }

                /* Убираем лишний padding-bottom, который был для fixed tabs */
                .content-wrapper {
                    padding-bottom: 0;
                }

        }
    </style>
</head>
<body class="bg-room">
    <div class="bg-switcher" id="bgSwitcher"></div>
    <button class="theme-toggle" id="themeToggle">☀️</button>

    <div class="app">
        <h1>Pupunkas ❤️ place</h1>
        <div class="sub">Скромная обитель нескромных пупунек</div>

        <div class="content-wrapper">
            <div class="tabs">
                <button class="tab active" data-tab="films">🎬 Кино / Сериал</button>
                <button class="tab" data-tab="cooking">🍳 Готовка вместе</button>
                <button class="tab" data-tab="places">🏞️ Места и отдых</button>
            </div>

            <!-- Контейнер для кнопок (мобильная версия) -->
            <div class="buttons-row">
                <button class="add-toggle-btn" id="globalAddBtn">➕ Добавить запись</button>
                <button class="mobile-random-btn" id="mobileRandomBtn">🎲 Рандом</button>
            </div>

            <div class="expandable-add-form" id="globalAddForm">
                <div class="inline-add-form" id="dynamicAddForm"></div>
            </div>

            <div id="filmsPanel" class="panel active">
                <div class="filter-bar">
                    <select id="genreFilter" class="filter-select"><option value="all">Все жанры</option></select>
                    <button id="randomFilmBtn" class="random-inline-btn">🎲 Рандом</button>
                </div>
                <ul id="filmsList" class="list"></ul>
            </div>

            <div id="cookingPanel" class="panel">
                <ul id="cookingList" class="list"></ul>
            </div>

            <div id="placesPanel" class="panel">
                <ul id="placesList" class="list"></ul>
            </div>
        </div>
    </div>

    <div id="toastMessage" class="toast-notification">
        <span>✨ Добавлено!</span>
        <button id="closeToastBtn">Ура!</button>
    </div>
    <div id="deleteModal" class="custom-modal">
        <div class="modal-content">
            <p>Удалить запись?</p>
            <div class="modal-buttons">
                <button class="modal-btn confirm" id="modalConfirm">Дяяя</button>
                <button class="modal-btn cancel" id="modalCancel">Неть</button>
            </div>
        </div>
    </div>
    <div id="avatarModal" class="avatar-modal">
        <div class="avatar-selector">
            <h3 id="avatarModalTitle">🐱 Выбери образ котика 🐱</h3>
            <div class="avatar-grid" id="avatarGrid"></div>
            <button class="avatar-close" id="avatarCloseBtn">Закрыть</button>
        </div>
    </div>

    <div id="catLeftContainer" class="cat-fixed cat-left"></div>
    <div id="catRightContainer" class="cat-fixed cat-right"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJI5DkbEs8_ojQHOTZ6NfXor8ZH4Rioao",
            authDomain: "pupunkas-place.firebaseapp.com",
            projectId: "pupunkas-place",
            storageBucket: "pupunkas-place.firebasestorage.app",
            messagingSenderId: "979886120410",
            appId: "1:979886120410:web:8ee8ed0096414e791634e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const filmsCol = collection(db, "films");
        const cookingCol = collection(db, "cooking");
        const placesCol = collection(db, "places");
        const statusCol = collection(db, "status_v2");
        const avatarsCol = collection(db, "avatars");

        const urlParams = new URLSearchParams(window.location.search);
        let currentUser = urlParams.get('user');
        if (!currentUser || (currentUser !== 'her' && currentUser !== 'his')) {
            const saved = localStorage.getItem('pupunkas_user');
            if (saved === 'her' || saved === 'his') currentUser = saved;
            else currentUser = 'her';
            localStorage.setItem('pupunkas_user', currentUser);
        }
        const isHer = currentUser === 'her';

        const HER_AVATARS = ['avatar/1w.png', 'avatar/2w.png', 'avatar/3w.png'];
        const HIS_AVATARS = ['avatar/1g.png', 'avatar/2g.png', 'avatar/3g.png'];
        let herAvatar = HER_AVATARS[0];
        let hisAvatar = HIS_AVATARS[0];

        let films = [], cooking = [], places = [];
        let currentGenreFilter = "all";
        let activeTab = "films";

        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            toast.querySelector('span').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        const genreIcons = { 'Драма':'🎭','Комедия':'😂','Ужасы':'👻','Фэнтези':'🐉','Аниме':'🍥','Боевик':'💥','Романтика':'💕','Триллер':'🔪' };

        function renderFilms() {
            let filtered = currentGenreFilter === 'all' ? films : films.filter(f => f.genre === currentGenreFilter);
            if (!filtered.length) {
                filmsListEl.innerHTML = '<div class="empty-msg">✨ Нет фильмов</div>';
                return;
            }
            filmsListEl.innerHTML = filtered.map(f => `
                <li data-id="${f.id}" data-type="films" class="${f.done ? 'done' : ''}">
                    <div class="item-info">
                        <span class="item-name">${escapeHtml(f.name)}</span>
                        <span class="item-genre">${genreIcons[f.genre] || '🎬'} ${escapeHtml(f.genre)}</span>
                        <span class="author-badge ${f.author === 'her' ? 'author-her' : 'author-his'}">${f.author === 'her' ? '🐱 Влада' : '🐱 Никита'}</span>
                    </div>
                    <div class="actions"><button class="done-btn" data-action="toggle">✓</button><button class="delete-btn" data-action="delete">✗</button></div>
                </li>
            `).join('');
        }

        function renderCooking() {
            if (!cooking.length) {
                cookingListEl.innerHTML = '<div class="empty-msg">🍳 Нет блюд</div>';
                return;
            }
            cookingListEl.innerHTML = cooking.map(c => `
                <li data-id="${c.id}" data-type="cooking" class="${c.done ? 'done' : ''}">
                    <div class="item-info">
                        <span class="item-name">${escapeHtml(c.name)}</span>
                        <span class="author-badge ${c.author === 'her' ? 'author-her' : 'author-his'}">${c.author === 'her' ? '🐱 Влада' : '🐱 Никита'}</span>
                    </div>
                    <div class="actions"><button class="done-btn" data-action="toggle">✓</button><button class="delete-btn" data-action="delete">✗</button></div>
                </li>
            `).join('');
        }

        function renderPlaces() {
            if (!places.length) {
                placesListEl.innerHTML = '<div class="empty-msg">🌳 Нет мест</div>';
                return;
            }
            placesListEl.innerHTML = places.map(p => `
                <li data-id="${p.id}" data-type="places" class="${p.done ? 'done' : ''}">
                    <div class="item-info">
                        <span class="item-name">${escapeHtml(p.name)}</span>
                        <span class="author-badge ${p.author === 'her' ? 'author-her' : 'author-his'}">${p.author === 'her' ? '🐱 Влада' : '🐱 Никита'}</span>
                    </div>
                    <div class="actions"><button class="done-btn" data-action="toggle">✓</button><button class="delete-btn" data-action="delete">✗</button></div>
                </li>
            `).join('');
        }

        function renderDesktopCats() {
            const leftContainer = document.getElementById('catLeftContainer');
            const rightContainer = document.getElementById('catRightContainer');
            leftContainer.innerHTML = `
                <div class="bubble"><span class="bubble-text" id="leftStatusText">✨ Хочу обнимашек ✨</span></div>
                <div class="cat-avatar" id="leftCatAvatar"><img id="leftCatImg" src="${isHer ? herAvatar : hisAvatar}"></div>
                <div class="cat-name">${isHer ? 'Влада' : 'Никита'}</div>
            `;
            rightContainer.innerHTML = `
                <div class="bubble"><span class="bubble-text" id="rightStatusText">🍜 Готовлю ужин 🍜</span></div>
                <div class="cat-avatar" id="rightCatAvatar"><img id="rightCatImg" src="${isHer ? hisAvatar : herAvatar}"></div>
                <div class="cat-name">${isHer ? 'Никита' : 'Влада'}</div>
            `;
        }

        function updateDesktopAvatars() {
            const leftImg = document.getElementById('leftCatImg');
            const rightImg = document.getElementById('rightCatImg');
            if (leftImg) leftImg.src = isHer ? herAvatar : hisAvatar;
            if (rightImg) rightImg.src = isHer ? hisAvatar : herAvatar;
        }

        async function loadAvatars() {
            const snap = await getDocs(avatarsCol);
            snap.forEach(doc => {
                const data = doc.data();
                if (data.owner === 'her') herAvatar = data.avatar;
                if (data.owner === 'his') hisAvatar = data.avatar;
            });
            updateDesktopAvatars();
        }

        async function addItem(collectionRef, name, extra = {}) {
            if (!name.trim()) return;
            await addDoc(collectionRef, {
                name: name.trim(),
                done: false,
                createdAt: new Date(),
                author: currentUser,
                ...extra
            });
            showToast('✅ Добавлено!');
        }

        let pendingDelete = null;
        const modal = document.getElementById('deleteModal');
        function showDeleteModal(callback) {
            pendingDelete = callback;
            modal.classList.add('show');
        }
        document.getElementById('modalConfirm').onclick = () => {
            if (pendingDelete) pendingDelete(true);
            modal.classList.remove('show');
        };
        document.getElementById('modalCancel').onclick = () => {
            if (pendingDelete) pendingDelete(false);
            modal.classList.remove('show');
        };

        async function handleDelete(collectionRef, id) {
            return new Promise((resolve) => {
                showDeleteModal(async (confirmed) => {
                    if (confirmed) {
                        await deleteDoc(doc(collectionRef, id));
                        showToast('🗑️ Удалено!');
                    }
                    resolve();
                });
            });
        }

        const filmsListEl = document.getElementById('filmsList');
        const cookingListEl = document.getElementById('cookingList');
        const placesListEl = document.getElementById('placesList');

        onSnapshot(query(filmsCol, orderBy("createdAt", "desc")), (snap) => {
            films = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderFilms();
        });
        onSnapshot(query(cookingCol, orderBy("createdAt", "desc")), (snap) => {
            cooking = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderCooking();
        });
        onSnapshot(query(placesCol, orderBy("createdAt", "desc")), (snap) => {
            places = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderPlaces();
        });

        onSnapshot(statusCol, (snap) => {
            snap.forEach(doc => {
                const data = doc.data();
                const leftSpan = document.getElementById('leftStatusText');
                const rightSpan = document.getElementById('rightStatusText');
                if (data.owner === 'her') {
                    if (isHer && leftSpan) leftSpan.textContent = data.text;
                    if (!isHer && rightSpan) rightSpan.textContent = data.text;
                }
                if (data.owner === 'his') {
                    if (!isHer && leftSpan) leftSpan.textContent = data.text;
                    if (isHer && rightSpan) rightSpan.textContent = data.text;
                }
            });
        });

        const genreSelect = document.getElementById('genreFilter');
        const globalAddForm = document.getElementById('globalAddForm');
        const dynamicAddForm = document.getElementById('dynamicAddForm');

        const genres = ['Драма','Комедия','Ужасы','Фэнтези','Аниме','Боевик','Романтика','Триллер'];
        genres.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g;
            opt.textContent = `${genreIcons[g] || '🎬'} ${g}`;
            genreSelect.appendChild(opt);
        });
        genreSelect.addEventListener('change', (e) => {
            currentGenreFilter = e.target.value;
            renderFilms();
        });

        // Функция для случайного фильма
        function handleRandomFilm() {
            const active = films.filter(i => !i.done);
            if (!active.length) { alert('Нет активных фильмов'); return; }
            const rand = active[Math.floor(Math.random() * active.length)];
            alert(`🎉 ${rand.name} (${rand.genre})\n✨ Добавил: ${rand.author === 'her' ? 'Влада' : 'Никита'}`);
        }

        document.getElementById('randomFilmBtn').addEventListener('click', handleRandomFilm);
        document.getElementById('mobileRandomBtn').addEventListener('click', handleRandomFilm);

        function updateAddForm() {
            if (activeTab === 'films') {
                dynamicAddForm.innerHTML = `
                    <input type="text" id="newItemInput" placeholder="Название фильма...">
                    <select id="filmGenre">
                        <option value="Драма">🎭 Драма</option>
                        <option value="Комедия">😂 Комедия</option>
                        <option value="Ужасы">👻 Ужасы</option>
                        <option value="Фэнтези">🐉 Фэнтези</option>
                        <option value="Аниме">🍥 Аниме</option>
                        <option value="Боевик">💥 Боевик</option>
                        <option value="Романтика">💕 Романтика</option>
                        <option value="Триллер">🔪 Триллер</option>
                    </select>
                    <button id="dynamicAddBtn" class="inline-add-btn">+ Добавить фильм</button>
                `;
            } else if (activeTab === 'cooking') {
                dynamicAddForm.innerHTML = `
                    <input type="text" id="newItemInput" placeholder="Блюдо...">
                    <button id="dynamicAddBtn" class="inline-add-btn">+ Добавить блюдо</button>
                `;
            } else {
                dynamicAddForm.innerHTML = `
                    <input type="text" id="newItemInput" placeholder="Место...">
                    <button id="dynamicAddBtn" class="inline-add-btn">+ Добавить место</button>
                `;
            }
            const addBtn = document.getElementById('dynamicAddBtn');
            const input = document.getElementById('newItemInput');
            if (addBtn) {
                addBtn.onclick = async () => {
                    const name = input?.value || '';
                    if (!name.trim()) return;
                    if (activeTab === 'films') {
                        const genre = document.getElementById('filmGenre')?.value || 'Драма';
                        await addItem(filmsCol, name, { genre });
                    } else if (activeTab === 'cooking') {
                        await addItem(cookingCol, name);
                    } else {
                        await addItem(placesCol, name);
                    }
                    if (input) input.value = '';
                    closeForm();
                };
            }
            if (input) {
                input.onkeypress = (e) => { if (e.key === 'Enter') addBtn?.click(); };
            }
        }

        function closeForm() {
            globalAddForm.classList.remove('show');
            document.body.classList.remove('form-open');
        }

        document.getElementById('globalAddBtn').addEventListener('click', () => {
            if (globalAddForm.classList.contains('show')) {
                closeForm();
            } else {
                updateAddForm();
                globalAddForm.classList.add('show');
                // На мобильных добавляем класс для скрытия котиков
                if (window.innerWidth <= 768) {
                    document.body.classList.add('form-open');
                }
                setTimeout(() => document.getElementById('newItemInput')?.focus(), 100);
            }
        });

        // Закрытие формы при клике на фон (только для мобильной версии)
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && globalAddForm.classList.contains('show')) {
                if (!globalAddForm.contains(e.target) && e.target !== document.getElementById('globalAddBtn')) {
                    closeForm();
                }
            }
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const tabId = tab.dataset.tab;
                document.getElementById(`${tabId}Panel`).classList.add('active');
                activeTab = tabId;
                if (globalAddForm.classList.contains('show')) updateAddForm();
            });
        });

        document.body.addEventListener('click', async (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const li = btn.closest('li');
            if (!li) return;
            const id = li.dataset.id;
            const type = li.dataset.type;
            const action = btn.dataset.action;
            let item, col;
            if (type === 'films') { col = filmsCol; item = films.find(i => i.id === id); }
            else if (type === 'cooking') { col = cookingCol; item = cooking.find(i => i.id === id); }
            else { col = placesCol; item = places.find(i => i.id === id); }
            if (!item) return;
            if (action === 'toggle') {
                await updateDoc(doc(col, id), { done: !item.done });
            } else if (action === 'delete') {
                await handleDelete(col, id);
            }
        });

        window.makeEditable = function(element, owner) {
            const MAX_LEN = 25;
            if ((owner === 'her' && !isHer) || (owner === 'his' && isHer)) {
                showToast('💭 Ты можешь менять только свой статус!');
                return;
            }
            const original = element.textContent;
            element.style.display = 'none';
            const input = document.createElement('input');
            input.type = 'text';
            input.value = original;
            input.maxLength = MAX_LEN;
            input.className = 'status-input';
            const btnDiv = document.createElement('div');
            btnDiv.className = 'edit-buttons';
            const saveBtn = document.createElement('button'); saveBtn.textContent = '✅';
            const cancelBtn = document.createElement('button'); cancelBtn.textContent = '❌';
            btnDiv.append(saveBtn, cancelBtn);
            element.parentElement.insertBefore(input, element.nextSibling);
            element.parentElement.insertBefore(btnDiv, input.nextSibling);
            input.focus();
            const cleanup = () => { input.remove(); btnDiv.remove(); element.style.display = ''; };
            const save = async () => {
                let newText = input.value.trim();
                if (newText.length > MAX_LEN) {
                    showToast(`❌ Максимум ${MAX_LEN} символов`);
                    return;
                }
                if (newText && newText !== original) {
                    element.textContent = newText;
                    const snap = await getDocs(statusCol);
                    let existing = null;
                    snap.forEach(d => { if (d.data().owner === owner) existing = d; });
                    if (existing) {
                        await updateDoc(doc(db, "status_v2", existing.id), { text: newText });
                    } else {
                        await addDoc(statusCol, { owner, text: newText });
                    }
                    showToast('💬 Статус обновлён!');
                }
                cleanup();
            };
            saveBtn.onclick = save;
            cancelBtn.onclick = cleanup;
            input.onkeypress = (e) => { if (e.key === 'Enter') save(); };
        };

        function pulseElement(element) {
            if (!element) return;
            element.style.transition = 'transform 0.1s ease';
            element.style.transform = 'scale(1.1)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
                setTimeout(() => { element.style.transition = ''; }, 200);
            }, 100);
        }

        function flyMeow(x, y) {
            const meow = document.createElement('div');
            meow.textContent = 'мяу';
            meow.style.position = 'fixed';
            meow.style.left = x + 'px';
            meow.style.top = y + 'px';
            meow.style.fontSize = '1.3rem';
            meow.style.fontWeight = 'bold';
            meow.style.color = 'var(--text-color)';
            meow.style.pointerEvents = 'none';
            meow.style.zIndex = '10001';
            meow.style.whiteSpace = 'nowrap';
            meow.style.textShadow = '0 0 2px rgba(0,0,0,0.2)';
            meow.style.transition = 'transform 1s ease-out, opacity 1.1s ease-out';
            meow.style.opacity = '1';
            document.body.appendChild(meow);
            
            const shiftX = (Math.random() - 0.5) * 200; 
            const shiftY = -150; 
            requestAnimationFrame(() => {
                meow.style.transform = `translate(${shiftX}px, ${shiftY}px) rotate(${shiftX * 0.15}deg)`;
                meow.style.opacity = '0';
            });
            
            setTimeout(() => meow.remove(), 1200);
        }

        function heartBurst(x, y) {
            const burstContainer = document.createElement('div');
            burstContainer.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10000; overflow: hidden;';
            document.body.appendChild(burstContainer);
            const heartCount = 30;
            const hearts = ['❤️', '💖', '💗', '💓', '💕', '💝', '💘', '🌸', '🌷', '💞'];
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.position = 'absolute';
                heart.style.fontSize = (16 + Math.random() * 20) + 'px';
                heart.style.color = `hsl(${Math.random() * 20 + 340}, 70%, 60%)`;
                heart.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
                heart.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
                heart.style.opacity = '1';
                heart.style.pointerEvents = 'none';
                const angle = Math.random() * Math.PI * 2;
                const distance = 60 + Math.random() * 140;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 100;
                heart.style.transition = 'all 1s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
                burstContainer.appendChild(heart);
                requestAnimationFrame(() => {
                    heart.style.transform = `translate(${dx}px, ${dy}px) scale(0.3) rotate(${Math.random() * 40 - 20}deg)`;
                    heart.style.opacity = '0';
                });
                heart.addEventListener('transitionend', () => heart.remove(), { once: true });
            }
            setTimeout(() => burstContainer.remove(), 1200);
        }

        document.getElementById('closeToastBtn').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            heartBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
            document.getElementById('toastMessage').classList.remove('show');
        });

        function loadUserSettings() {
            const savedTheme = localStorage.getItem(`theme_${currentUser}`);
            if (savedTheme === 'dark') document.body.classList.add('dark');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
            const savedBg = localStorage.getItem(`bg_${currentUser}`) || 'room';
            document.body.classList.forEach(c => { if (c.startsWith('bg-')) document.body.classList.remove(c); });
            document.body.classList.add(`bg-${savedBg}`);
        }
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem(`theme_${currentUser}`, document.body.classList.contains('dark') ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
        });
        const bgList = [
            { id: 'room', name: 'Комната', img: 'background/pexels-asumaani-17279643.jpg' },
            { id: 'room2', name: 'Комната 2', img: 'background/pexels-cottonbro-6156879.jpg' },
            { id: 'cats', name: 'Котики', img: 'background/qujrvux9fssg1.jpeg' },
            { id: 'gradient', name: 'Градиент', img: null }
        ];
        const bgSwitcher = document.getElementById('bgSwitcher');
        bgSwitcher.innerHTML = '';
        bgList.forEach(bg => {
            const btn = document.createElement('div');
            btn.className = 'bg-btn';
            btn.title = bg.name;
            if (bg.img) {
                btn.style.backgroundImage = `url('${bg.img}')`;
                btn.style.backgroundSize = 'cover';
            } else {
                btn.style.background = 'linear-gradient(135deg, #f5a5a5, #e07a5a)';
            }
            if (localStorage.getItem(`bg_${currentUser}`) === bg.id) btn.classList.add('active');
            else if (!localStorage.getItem(`bg_${currentUser}`) && bg.id === 'room') btn.classList.add('active');
            btn.addEventListener('click', () => {
                bgList.forEach(b => document.body.classList.remove(`bg-${b.id}`));
                document.body.classList.add(`bg-${bg.id}`);
                localStorage.setItem(`bg_${currentUser}`, bg.id);
                document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
            bgSwitcher.appendChild(btn);
        });

        function setupAvatarModal() {
            const modalEl = document.getElementById('avatarModal');
            const closeBtn = document.getElementById('avatarCloseBtn');
            const grid = document.getElementById('avatarGrid');
            
            window.openAvatarSelector = function(owner) {
                if ((owner === 'her' && !isHer) || (owner === 'his' && isHer)) {
                    showToast('💭 Это не твой котик!');
                    return;
                }
                const currentAvatar = owner === 'her' ? herAvatar : hisAvatar;
                const avatarUrls = owner === 'her' ? HER_AVATARS : HIS_AVATARS;
                document.getElementById('avatarModalTitle').textContent = `${'Выбери образ под настроение!'}`;
                
                grid.innerHTML = avatarUrls.map(url => `
                    <div class="avatar-option ${currentAvatar === url ? 'selected' : ''}" data-url="${url}">
                        <img src="${url}" alt="avatar">
                        <span>${url.includes('1') ? 'Милашка' : url.includes('2') ? 'Сладусик' : 'Грустняшка'}</span>
                    </div>
                `).join('');
                
                grid.querySelectorAll('.avatar-option').forEach(opt => {
                    opt.addEventListener('click', async () => {
                        const newAvatar = opt.dataset.url;
                        const snap = await getDocs(avatarsCol);
                        let existing = null;
                        snap.forEach(doc => {
                            if (doc.data().owner === owner) existing = doc;
                        });
                        if (existing) {
                            await updateDoc(doc(db, "avatars", existing.id), { avatar: newAvatar });
                        } else {
                            await addDoc(avatarsCol, { owner, avatar: newAvatar });
                        }
                        if (owner === 'her') herAvatar = newAvatar;
                        else hisAvatar = newAvatar;
                        updateDesktopAvatars();
                        showToast('🐱 Образ обновлён!');
                        modalEl.classList.remove('show');
                    });
                });
                
                modalEl.classList.add('show');
            };
            
            closeBtn.onclick = () => modalEl.classList.remove('show');
            modalEl.addEventListener('click', (e) => {
                if (e.target === modalEl) modalEl.classList.remove('show');
            });
        }

        function attachCatClickHandlers() {
            const leftCat = document.querySelector('.cat-left .cat-avatar');
            const rightCat = document.querySelector('.cat-right .cat-avatar');
            
            if (leftCat) {
                leftCat.style.cursor = 'pointer';
                leftCat.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.openAvatarSelector(isHer ? 'her' : 'his');
                });
            }
            
            if (rightCat) {
                rightCat.style.cursor = 'pointer';
                rightCat.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const rect = rightCat.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    pulseElement(rightCat);
                    flyMeow(centerX, centerY);
                });
            }
        }

        renderDesktopCats();
        setupAvatarModal();
        attachCatClickHandlers();
        loadAvatars();
        loadUserSettings();

        setTimeout(() => {
            const leftStatus = document.getElementById('leftStatusText');
            const rightStatus = document.getElementById('rightStatusText');
            if (leftStatus) leftStatus.addEventListener('click', () => window.makeEditable(leftStatus, isHer ? 'her' : 'his'));
            if (rightStatus) rightStatus.style.cursor = 'default';
        }, 100);
    </script>
</body>
</html>
